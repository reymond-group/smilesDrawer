<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../../common.css" />
    <title>SmilesDrawer Example</title>
    <script type="text/javascript" src="../../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="version"></div>
      <h1>SmilesDrawer Example</h1>
    </header>
    <content>
      <input id="smiles" value="CCC" />
      <canvas id="output"></canvas>
    </content>
    <script type="text/javascript">
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      function render(smiles, target, theme) {
        SmilesDrawer.parse(smiles, (tree) => {
          const drawer = new SmilesDrawer.Drawer({width: 300, height: 200});
          drawer.draw(tree, target, theme)
        }, (error) => {
          // Handle parse errors (invalid SMILES) here.
          console.warn(error);
        })
      }

      const input  = document.getElementById('smiles');
      const output = document.getElementById('output');

      // This fires when the user hits enter or changes focus.
      // Listen for 'keyup' to fire on every keystroke.
      input.addEventListener('change', (event) => {
        render(input.value, output, 'light');
      })

      // The first render, for when the page loads.
      render(input.value, output, 'light');
    </script>
  </body>
</html>
