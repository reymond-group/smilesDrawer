<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../../common.css" />
    <title>SmilesDrawer Example</title>
    <script type="text/javascript" src="../../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="version"></div>
      <h1>SmilesDrawer Example</h1>
    </header>
    <content>
      <canvas data-smiles="C"></canvas>
      <canvas data-smiles="CC"></canvas>
      <canvas data-smiles="CCC"></canvas>
      <canvas data-smiles="CCCC"></canvas>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      // Call apply() to draw all the molecules!
      SmilesDrawer.apply({width: 300, height: 200});
    </script>
  </body>
</html>
