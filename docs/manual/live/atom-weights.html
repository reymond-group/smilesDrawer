<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>SmilesDrawer Examples: Weights</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>SmilesDrawer Examples: Weights</h1>
    </header>
    <content>
      <div><svg id="output1" data-smiles="CCCCN" data-smiles-weights="-2,-1,0,1,2"></svg></div>
      <div><svg id="output2"></svg></div>
      <div><canvas id="output3"></canvas></div>
      <div><svg id="output4"></svg></div>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      // Use the same options for all four drawings:
      const options = {width: 500, height: 200};

      function useApply() {
        const drawer = new SmilesDrawer.SmiDrawer(options);
        drawer.apply();
      }

      function useDraw() {
        const drawer = new SmilesDrawer.SmiDrawer(options);
        drawer.draw('CCCCCCN', '#output2', 'light', null, null, [-3, -2, -1, 0, 1, 2, 3]);
      }

      function useParseThenDrawCanvas() {
        SmilesDrawer.parse('CCCCCCCCN', (result) => {
          const drawer = new SmilesDrawer.SvgDrawer(options);
          drawer.drawCanvas(result, 'output3', 'light', [-4, -3, -2, -1, 0, 1, 2, 3, 4]);
        }, (error) => {
          console.error(error);
        });
      }

      function useParseThenDrawSvg() {
        SmilesDrawer.parse('CCCCCCCCN', (result) => {
          const drawer = new SmilesDrawer.SvgDrawer(options);
          drawer.draw(result, 'output4', 'light', [-4, -3, -2, -1, 0, 1, 2, 3, 4]);
        }, (error) => {
          console.error(error);
        });
      }

      useApply();
      useDraw();
      useParseThenDrawCanvas();
      useParseThenDrawSvg();
    </script>
  </body>
</html>
