<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>SmilesDrawer Examples: Reaction Weights</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>SmilesDrawer Examples: Reaction Weights</h1>
    </header>
    <content>
      <div><canvas id="output-1"
        data-smiles="CF.FC#N>>CC#N.FF"
        data-smiles-reactant-weights="1,0;0,-1,0"
        data-smiles-product-weights="1,-1,0;0,0"
      ></canvas></div>
      <div><canvas id="output2"></canvas></div>
      <div><svg id="output3"></svg></div>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      // Use the same options for all three drawings:
      const molecule_opts = {width: 500, height: 150};
      const reaction_opts = {};

      function useApply() {
        const drawer = new SmilesDrawer.SmiDrawer(molecule_opts, reaction_opts);
        drawer.apply();
      }

      function useDraw() {
        const weights = {
          reactants: [[1, 0], [0, -1, 0]],
          reagents:  [], // Could also be omitted.
          products:  [[1, -1, 0], [0, 0]]
        };

        const drawer = new SmilesDrawer.SmiDrawer(molecule_opts, reaction_opts);
        drawer.draw('CF.FC#N>>CC#N.FF', '#output2', 'light', null, null, weights);
      }

      function useParseThenDraw() {
        const weights = {
          reactants: [[1, 0], [0, -1, 0]],
          reagents:  [], // Could also be omitted.
          products:  [[1, -1, 0], [0, 0]]
        };

        SmilesDrawer.parseReaction('CF.FC#N>>CC#N.FF', (result) => {
          const drawer = new SmilesDrawer.ReactionDrawer(reaction_opts, molecule_opts);
          drawer.draw(result, 'output3', 'light', weights);
        }, (error) => {
          console.error(error);
        });
      }

      useApply();
      useDraw();
      useParseThenDraw();
    </script>
  </body>
</html>
