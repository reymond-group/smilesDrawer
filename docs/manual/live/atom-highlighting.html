<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>Advanced SmilesDrawer: Atom Highlighting</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>Advanced SmilesDrawer: Atom Highlighting</h1>
    </header>
    <content>
      <div><canvas id="output1"></canvas></div>
      <div><svg id="output2"></svg></div>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      // Use the same options for both drawings:
      const options = {width: 500, height: 200};

      function drawToCanvas() {
        SmilesDrawer.parse('CCCC[CH2:1][CH2:2]CC[NH2:2]', (result) => {
          const drawer = new SmilesDrawer.Drawer(options);
          drawer.draw(result, 'output1', 'light', false, [[1, '#ff8'], [2, '#8f8']]);
        }, (error) => {
          console.error(error);
        });
      }

      function drawToSvg() {
        SmilesDrawer.parse('CCCC[CH2:1][CH2:2]CC[NH2:2]', (result) => {
          const drawer = new SmilesDrawer.SvgDrawer(options);
          drawer.draw(result, 'output2', 'light', null, false, [[1, '#ff8'], [2, '#8f8']]);
        }, (error) => {
          console.error(error);
        });
      }

      drawToCanvas();
      drawToSvg();
    </script>
  </body>
</html>
