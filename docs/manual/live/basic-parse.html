<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>SmilesDrawer Examples: parse()</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.min.js"></script>
    <style type="text/css">
      input {width: 500px};
    </style>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>SmilesDrawer Examples: parse()</h1>
    </header>
    <content>
      <div>
        <input id="smiles" value="[Na+].[O-]S(=O)(=O)c5cc(/N=N/c1ccc(cc1)c4ccc(/N=N/c3cc(c2ccccc2c3N)S([O-].[Na+])(=O)=O)cc4)c(N)c6c5cccc6" placeholder="Your SMILES here..." />
      </div>
      <div>
        <canvas id="output"></canvas>
      </div>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      function render(smiles, target, theme) {
        SmilesDrawer.parse(smiles, (result) => {
          const drawer = new SmilesDrawer.Drawer({width: 500, height: 400});
          drawer.draw(result, target, theme);
        }, (error) => {
          // Handle parse errors (invalid SMILES) here.
          console.warn(error);
        });
      }

      const input  = document.getElementById('smiles');
      const output = document.getElementById('output');

      // This fires on every keystroke.
      input.addEventListener('keyup', (event) => {
        render(input.value, output, 'light');
      })

      // The first render, for when the page loads.
      render(input.value, output, 'light');
    </script>
  </body>
</html>
