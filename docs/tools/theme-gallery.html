<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>SmilesDrawer Theme Gallery</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.js"></script>
    <style type="text/css">
      .theme {
        border: 1px solid #ddd;
        border-radius: 10px;
        overflow: auto;
        padding: 10px;
        margin-bottom: 1rem;

        float: left;
        clear: right;
      }

      .theme h2 {
        font-weight: normal;
        margin: 0px 10px;
      }

      .frame {
        border-radius: 4px;
        float: left;
        padding: 4px;
        margin: 6px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>SmilesDrawer Theme Gallery</h1>
    </header>
    <content id="themes"></content>
    <script type="text/javascript">
      const version = document.getElementById('version')
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version

      // These aren't in a constant at the moment, so make a dummy object...
      const OPTIONS  = new SmilesDrawer.SvgDrawer().preprocessor.defaultOptions

      const EXAMPLES = {
        'Caffeine':   'Cn1cnc2c1C(=O)N(C(=O)N2C)C',
        'Glyphosate': 'O=C(O)CNCP(=O)(O)O',
        'Dithiopyr':  'FC(F)(F)c1nc(c(c(c1C(=O)SC)CC(C)C)C(=O)SC)C(F)F',
        'Halothane':  'BrC(Cl)C(F)(F)F',
      }

      const drawer = new SmilesDrawer.SmiDrawer({width: 300, height: 200})
      async function draw(smiles, target, theme) {
        drawer.draw(smiles, target, theme)
      }

      const themes = document.getElementById('themes')
      for (const [theme, colors] of Object.entries(OPTIONS.themes)) {
        if (theme === 'custom') {
          continue
        }

        const div = document.createElement('div')

        const blend  = theme.includes('dark')? 'white 20%' : 'black 10%'
        const accent = `color-mix(in srgb, ${colors.BACKGROUND}, ${blend})`

        div.style.backgroundColor = colors.BACKGROUND
        div.style.border = `1px solid ${accent}`
        div.style.color = colors.FOREGROUND
        div.classList.add('theme')

        const h2 = document.createElement('h2')
        h2.innerText = theme
        div.append(h2)

        for (const [name, smiles] of Object.entries(EXAMPLES)) {
          const frame  = document.createElement('div')
          frame.classList.add('frame')
          frame.style.backgroundColor = accent
          div.append(frame)

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          svg.setAttributeNS(null, 'width', '300')
          svg.setAttributeNS(null, 'height', '200')
          svg.setAttributeNS(null, 'data-smiles', smiles)
          svg.setAttributeNS(null, 'data-theme', theme)
          svg.style.backgroundColor = colors.BACKGROUND
          frame.append(svg)

          const label  = document.createElement('div')
          label.innerText = name
          frame.append(label)

          draw(smiles, svg, theme)
        }

        themes.append(div)
      }
    </script>
  </body>
</html>
