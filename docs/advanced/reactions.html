<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="../common.css" />
    <title>Advanced SmilesDrawer: Reactions</title>
    <script type="text/javascript" src="../../dist/smiles-drawer.min.js"></script>
  </head>
  <body>
    <header>
      <div id="version"></div>
      <h1>Advanced SmilesDrawer: Reactions</h1>
    </header>
    <content>
      <div><svg id="reaction0" data-smiles="FC(F)(F)CCl>>FC(F)(F)C(Br)Cl"></svg></div>
      <div><svg id="reaction1"></svg></div>
      <div><svg id="reaction2"></svg></div>
    </content>
    <script type="text/javascript">
      // Show the SmilesDrawer version in the header:
      const version = document.getElementById('version');
      version.innerText = 'Using SmilesDrawer v' + SmilesDrawer.Version;

      function useApply() {
        SmilesDrawer.SmiDrawer.apply();
      }

      function useDraw() {
        const reaction = 'c1ccccc1NNc2ccccc2>[H+]>c1cc(N)ccc1c2ccc(N)cc2';
        const drawer = new SmilesDrawer.SmiDrawer({width: 500, height: 300});
        drawer.draw(reaction, '#reaction1');
      }

      function parseThenDraw() {
        const reaction = 'c1c([R])cccc1S(=O)(=O)C.c1ncccc1B(CC)CC>>c1ncccc1c2cccc(S(=O)(=O)C)c2';
        const drawer = new SmilesDrawer.ReactionDrawer(); //{}, );

        SmilesDrawer.parseReaction(reaction, (result) => {
          drawer.draw(result, 'reaction2', 'light', null, 'Pd(PPh₃)₄', 'Bu₄NBr + K₂CO₃');
        }, (error) => {
          console.warn(error);
        });
      }

      useApply();
      useDraw();
      parseThenDraw();
    </script>
  </body>
</html>
