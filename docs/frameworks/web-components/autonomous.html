<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../../common.css" />
    <title>SmilesDrawer as a Web Component</title>
    <script type="text/javascript" src="../../../dist/smiles-drawer.min.js"></script>
    <script type="text/javascript">
      class SmilesDrawerElement extends HTMLElement {
        // Call attributeChangedCallback() when any of these are set:
        static get observedAttributes() {
          return ['smiles', 'width', 'height', 'theme'];
        }

        constructor() {
          super();

          this.blockDrawing = true;
          const shadow = this.attachShadow({mode: 'open'});
          const canvas = document.createElement('canvas');
          shadow.appendChild(canvas);
        }

        attributeChangedCallback(name, oldValue, newValue) {
          if (oldValue !== newValue) {
            this.modified = true;
            this.draw();
          }
        }

        connectedCallback() {
          if (this.blockDrawing) {
            this.blockDrawing = false;
            this.draw();
          }
        }

        delayDrawing(callback) {
          this.blockDrawing = true;
          callback();

          this.blockDrawing = false;
          if (this.modified) {
            this.draw();
          }
        }

        draw() {
          if (this.blockDrawing) {
            return;
          }

          const smiles = this.getAttribute('smiles');
          SmilesDrawer.parse(smiles, (tree) => {
            const options = {
              // This uses 500 as a default size (NaN is falsey):
              width:  Number.parseInt(this.getAttribute('width'))  || 500,
              height: Number.parseInt(this.getAttribute('height')) || 500
            };

            const canvas = this.shadowRoot.firstElementChild;
            const drawer = new SmilesDrawer.Drawer(options);
            const theme  = this.getAttribute('theme') || 'light';

            // console.log('Drawing...');
            drawer.draw(tree, canvas, theme);
          }, (error) => {
            // Handle parse errors (invalid SMILES) here.
            console.warn(error);
          });

          this.modified = false;
        }
      }

      // Register our new element type!
      customElements.define('smiles-drawer', SmilesDrawerElement);
    </script>
    <style type="text/css">
      smiles-drawer {
        /* Use this or `display: block` for sensible behaviour: */
        display: inline-block;

        /* Avoid a bug(?) that adds ~5px height: */
        line-height: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div id="top-right"><span id="version"></span></div>
      <h1>SmilesDrawer as a Web Component</h1>
    </header>
    <content>
      <smiles-drawer smiles="C" width="300" height="200"></smiles-drawer>
      <smiles-drawer smiles="CC" width="300" height="200"></smiles-drawer>
      <smiles-drawer smiles="CCC" width="300" height="200"></smiles-drawer>
      <smiles-drawer smiles="CCCC" width="300" height="200"></smiles-drawer>
    </content>
    <script type="text/javascript">
      // Show version numbers in the header:
      const version = document.getElementById('version');
      version.innerText = `Using SmilesDrawer v${SmilesDrawer.Version}`;
    </script>
  </body>
</html>
